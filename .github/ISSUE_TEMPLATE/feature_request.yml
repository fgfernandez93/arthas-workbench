name: 功能建议
description: 提交新能力、交互优化或架构改进建议
title: "[Feature] "
labels:
  - enhancement
body:
  - type: input
    id: summary
    attributes:
      label: 功能摘要
      placeholder: 用一句话描述希望新增或调整的能力
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: 现有问题
      description: 这个需求想解决什么痛点
      placeholder: 当前使用流程哪里不顺，或为什么现有能力不够
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      description: 描述你期望的行为、交互或架构方向
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 备选方案
      description: 是否考虑过其他方案，为什么没有采用
  - type: textarea
    id: scope
    attributes:
      label: 影响范围
      description: 是否会影响 Settings、Workbench、Sessions、MCP 或 Attach 流程
